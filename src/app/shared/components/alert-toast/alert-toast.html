<div
  class="alert-toast"
  [class.alert-toast--critical]="data().severidad === 'critical'"
  [class.alert-toast--suspicious]="data().severidad === 'suspicious'"
  role="alertdialog"
  aria-live="assertive"
  aria-atomic="true"
  [routerLink]="['/alerts', data().id]"
>
  <mat-icon class="alert-toast__icon" aria-hidden="true">{{ severityIcon(data().severidad) }}</mat-icon>

  <div class="alert-toast__body">
    <p class="alert-toast__title">{{ data().titulo }}</p>
    @if (data().descripcion) {
      <p class="alert-toast__desc">{{ data().descripcion }}</p>
    }
  </div>

  <button
    mat-icon-button
    class="alert-toast__close"
    aria-label="Cerrar notificación"
    (click)="close($event)"
  >
    <mat-icon>close</mat-icon>
  </button>
</div>
