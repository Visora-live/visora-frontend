<nav class="sidebar" aria-label="Navegación principal">
  <div class="sidebar-logo" aria-hidden="true">
    <svg class="sidebar-shield" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2 4 5v6c0 5 3.5 8.5 8 11 4.5-2.5 8-6 8-11V5l-8-3Z"/>
      <path d="m9 12 2 2 4-4"/>
    </svg>
  </div>

  <ul class="nav-list" role="list">
    @for (item of navItems(); track item.route) {
      <li>
        <a
          #rla="routerLinkActive"
          class="nav-item"
          [routerLink]="item.route"
          routerLinkActive="active"
          [attr.aria-current]="rla.isActive ? 'page' : null"
          [matTooltip]="item.label"
          matTooltipPosition="right"
        >
          <mat-icon class="nav-icon" aria-hidden="true">{{ item.icon }}</mat-icon>
        </a>
      </li>
    }
  </ul>

  <div class="sidebar-bottom">
    @if (isAdmin()) {
      <a
        class="nav-item"
        routerLink="/notifications"
        matTooltip="Notificaciones"
        matTooltipPosition="right"
        [matBadge]="unreadNotifs()"
        [matBadgeHidden]="unreadNotifs() === 0"
        matBadgeColor="warn"
        matBadgeSize="small"
      >
        <mat-icon class="nav-icon">notifications</mat-icon>
      </a>
    }

    <button
      class="nav-item sidebar-avatar"
      [matTooltip]="userTooltip()"
      matTooltipPosition="right"
      type="button"
      aria-label="Usuario actual"
    >
      {{ avatarInitials() }}
    </button>

    <button
      class="nav-item sidebar-logout"
      matTooltip="Cerrar sesión"
      matTooltipPosition="right"
      type="button"
      (click)="logout()"
      aria-label="Cerrar sesión"
    >
      <mat-icon class="nav-icon">logout</mat-icon>
    </button>
  </div>
</nav>
