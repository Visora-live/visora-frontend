<header class="topbar" role="banner">
  <button
    mat-icon-button
    class="menu-btn"
    (click)="onMenuToggle()"
    aria-label="Alternar menú lateral"
  >
    <mat-icon>menu</mat-icon>
  </button>

  <span class="topbar-divider" aria-hidden="true"></span>

  <span class="topbar-title" aria-live="polite">{{ pageTitle() }}</span>

  <span class="topbar-spacer"></span>

  @if (isAdmin()) {
    <a
      mat-icon-button
      class="notif-btn"
      routerLink="/notifications"
      aria-label="Notificaciones"
      [matBadge]="unreadNotifs()"
      [matBadgeHidden]="unreadNotifs() === 0"
      matBadgeColor="warn"
      matBadgeSize="small"
    >
      <mat-icon>notifications</mat-icon>
    </a>
  }

  <button
    mat-button
    class="user-btn"
    [matMenuTriggerFor]="userMenu"
    [attr.aria-label]="'Menú de usuario — ' + displayName()"
  >
    <div class="user-avatar" aria-hidden="true">{{ avatarInitials() }}</div>
    <mat-icon aria-hidden="true">expand_more</mat-icon>
  </button>

  <mat-menu #userMenu="matMenu">
    <button mat-menu-item (click)="logout()">
      <mat-icon>logout</mat-icon>
      <span>Cerrar sesión</span>
    </button>
  </mat-menu>
</header>
